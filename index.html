<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>跳转中...</title>
<style>
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
       margin: 0; padding: 60px 20px; text-align: center;
       background: #f5f7fa; color: #333; }
.box { background: white; max-width: 360px; margin: 0 auto;
       padding: 30px 24px; border-radius: 14px;
       box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.logo { width: 56px; height: 56px; background: #1677ff;
        color: white; border-radius: 14px;
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; font-weight: bold;
        margin: 0 auto 16px; }
h2 { font-size: 18px; margin: 0 0 8px; }
p { color: #888; font-size: 14px; line-height: 1.6; margin: 8px 0; }
.btn { display: inline-block; margin-top: 18px;
       padding: 12px 28px; background: #1677ff; color: white;
       border-radius: 10px; text-decoration: none;
       font-size: 15px; font-weight: 500; }
.err { color: #d4380d; font-size: 13px; margin-top: 12px; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">支</div>
  <h2>正在跳转支付宝...</h2>
  <p id="status">请稍等</p>
  <a id="go" class="btn" href="#" style="display:none">手动打开</a>
  <p class="err" id="err"></p>
</div>
<script>
(function() {
  var status = document.getElementById('status');
  var btn = document.getElementById('go');
  var err = document.getElementById('err');

  function getParam(name) {
    var match = location.search.match(new RegExp('[?&]' + name + '=([^&]+)'));
    return match ? decodeURIComponent(match[1]) : null;
  }

  var u = getParam('u');
  if (!u) {
    status.textContent = '没有目标地址';
    err.textContent = '请在 URL 后加 ?u=支付宝链接';
    return;
  }

  // 解码:先 base64-url 解,再回退普通 URL
  if (u.indexOf('http') !== 0) {
    try {
      var b64 = u.replace(/-/g, '+').replace(/_/g, '/');
      while (b64.length % 4) b64 += '=';
      u = decodeURIComponent(escape(atob(b64)));
    } catch (e) {}
  }

  if (u.indexOf('http') !== 0) {
    status.textContent = '目标地址格式错误';
    err.textContent = u.substring(0, 60);
    return;
  }

  btn.href = u;
  btn.style.display = 'inline-block';
  status.textContent = '即将打开支付宝付款';

  // 立即跳转
  setTimeout(function() { location.replace(u); }, 200);

  // 2 秒后还没走 -> 提示手动
  setTimeout(function() {
    status.textContent = '没自动跳?点下面按钮';
  }, 2500);
})();
</script>
</body>
</html>
